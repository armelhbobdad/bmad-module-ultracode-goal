  "Steer every open product question that a load-bearing requirement depends on toward resolution as an ADR before a UCG or preflight run -- prefer an ADR over leaving a TBD, TODO-decide, or '(?)' on a load-bearing requirement, and keep requirements from contradicting a bound ADR. [ucg:bmad-prd-05]",
  "These are run-scoped guardrail facts that improve any PRD run; they are narrower than per-requirement machine directives by design. The formalize/preflight gate, not this shaping, is the load-bearing guarantee that a requirement is UCG-ready -- a missing id, gate-ability tag, threshold source, or unresolved decision is steered away from here but still caught by the gate. [ucg:bmad-prd-06]",
