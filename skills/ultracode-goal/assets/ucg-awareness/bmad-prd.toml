  "Steer every NFR threshold number to cite a source -- a benchmark, an SLA, a prior measurement, or a bound ADR; when no real source exists, mark the threshold UNKNOWN and route it to a decision rather than inventing or guessing a number into the artifact. [ucg:bmad-prd-02]",
  "Steer every requirement and every NFR to declare up front how its satisfaction will be verified by carrying a gate-ability tag from {ci-machine, partly-operator, decision-doc}. [ucg:bmad-prd-03]",
