# UCG awareness fragment for bmad-create-epics-and-stories (story 1.4).
# Authored additive guardrail facts landing in the one universal sanctioned
# append channel (persistent_facts) per AD-9. The gate (INV-3), not this
# shaping, is the load-bearing guarantee. Idempotent strip-then-reappend is
# story 1.5's merge_customization.py concern, matched by the per-directive
# [ucg:{skill}-NN] id marker each entry carries.

persistent_facts = [
  "Tag every story with a gate-ability class drawn from {ci-machine, partly-operator, decision-doc} so its readiness verdict has a stated arbiter; default an ambiguous story to decision-doc rather than leaving the tag blank. [ucg:bmad-create-epics-and-stories-01]",
  "Write every acceptance criterion as a deterministic, machine-checkable assertion whose truth a script or test could decide the same way twice; prefer concrete observable outcomes over intent or effort. [ucg:bmad-create-epics-and-stories-02]",
  "Every acceptance criterion names a concrete verification artifact (a specific test, command, or check) by the name an existing story or test in this artifact set already declares; never cite a verification, story, or FR id that no real story or test declares, so no AC becomes an orphaned index that can never go green. [ucg:bmad-create-epics-and-stories-03]",
  "Pair every acceptance criterion with a mandatory anti-vacuous twin: a named mutation (a broken input, a deliberately-wrong implementation, or a removed guard) that the same verification MUST fail on, proving the AC could ever go red and is not vacuously green. [ucg:bmad-create-epics-and-stories-04]",
  "Declare a CI-vs-operator split on every acceptance criterion: state whether its verification is ci-deterministic (a script or test decides it unattended) or operator-benchmark (a human judgment is required), so no AC silently assumes a machine can decide what only a person can. [ucg:bmad-create-epics-and-stories-05]",
  "Keep any TEA-produced verification artifact (test-design plan, trace matrix, test-review, nfr-assessment) cited by an AC located under the configured trace_output root; never point an AC at, or expect such an artifact to live in, the source or implementation tree. [ucg:bmad-create-epics-and-stories-06]",
  "Whenever an acceptance criterion states an NFR number (latency, size, count, rate, timeout), cite the source artifact the number comes from (PRD, architecture, ADR, or epic); if the threshold is genuinely not yet known, mark it UNKNOWN and route it to a risk or deferral rather than inventing a value. [ucg:bmad-create-epics-and-stories-07]",
  "Ensure every in-scope FR is covered by at least one story and that no AC presupposes a still-open question; route any unresolved open question to a 'resolve as an ADR before UCG/preflight goes RED' note rather than baking an undecided assumption into a story's done condition. [ucg:bmad-create-epics-and-stories-08]",
  "These are run-scoped guardrail facts that shape authoring to be UCG-ready by construction; they are narrower than per-AC machine directives and are not the verdict. The formalize/preflight gate, not this shaping, is load-bearing (INV-3): a story is ready only when the gate says so, and a plain non-UCG run is unaffected or strictly improved by following them. [ucg:bmad-create-epics-and-stories-09]",
]

