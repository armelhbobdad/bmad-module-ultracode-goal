name: Quality & Validation

# Runs comprehensive quality checks on all PRs:
# - Prettier (formatting)
# - ESLint (linting)
# - markdownlint (markdown quality)
# - Installation component tests (module.yaml, SKILL.md, scripts)
# - CLI integration tests (install/update/uninstall flows)
# - Skill structure validation
# - File reference validation
# - Python script tests (pytest via uv)

"on":
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  prettier:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prettier format check
        run: npm run format:check

  eslint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: markdownlint
        run: npm run lint:md

  validate:
    # Matrix Linux + Windows to catch platform-divergence bugs (path handling,
    # line endings, shell scripts). macOS skipped: POSIX-equivalent to Linux
    # for UCG's Node + Python surface area — add only if a Mac-only bug surfaces.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # test:cli drives the real installer (Step 6b runs merge_customization.py
      # via `uv run`) and round-trips TOML through `uv`/`python3` helpers, so the
      # validate job needs both on PATH — same uv setup the python job uses.
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Smoke test conventional-changelog-cli bin resolution on Windows
        if: runner.os == 'Windows'
        run: npx --no-install conventional-changelog-cli --help

      - name: Test installation components
        run: npm run test:install

      - name: Test CLI integration
        run: npm run test:cli

      - name: Validate skills structure
        run: npm run validate:skills

      - name: Validate file references
        run: npm run validate:refs

  python:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Python tests
        run: npm run test:python
